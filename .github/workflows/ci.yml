# CI: build must succeed from a bare clone, and the built site must pass the
# NEGATIVE AUDIT — no broken links/anchors, no leaked comments, no retired brand,
# no banned phrases (see scripts/negative-audit.mjs; warnings are review flags,
# errors fail the build). External-link checks are skipped in CI (flaky network);
# the full audit incl. externals runs locally before any deploy.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Negative audit (site surface)
        run: |
          npx astro preview --port 4321 &
          for i in $(seq 1 30); do curl -sf http://localhost:4321/ >/dev/null && break; sleep 1; done
          node scripts/negative-audit.mjs --site-only --skip-external
